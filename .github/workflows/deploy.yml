# Deploy OpenNext (Next.js) to Cloudflare Workers on push to main.
# Prerequisites: GitHub repo secrets (see DEPLOY.md).

name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cf-workers
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      NODE_ENV: production
      # Public URL for Next.js build (Turnstile return / Stripe success redirects)
      NEXT_PUBLIC_APP_URL: https://seo.clawify.dev
      # Optional: set in repo secrets so the client bundle includes Turnstile
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # NODE_ENV=production would skip devDependencies; Next build needs tailwind, postcss, typescript, etc.
      - name: Install dependencies
        run: npm ci --include=dev

      - name: Inject KV namespace id (optional)
        env:
          KV_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          if [ -n "$KV_ID" ]; then
            sed -i "s/00000000000000000000000000000000/${KV_ID}/g" wrangler.jsonc
            echo "KV id injected from CLOUDFLARE_KV_NAMESPACE_ID secret."
          else
            echo "CLOUDFLARE_KV_NAMESPACE_ID not set — using wrangler.jsonc as committed (ensure id is valid)."
          fi

      - name: Build & deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
